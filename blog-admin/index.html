<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Sri Sai Speciality Dental Care</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .blog-container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .blog-header { text-align: center; margin-bottom: 40px; }
        .blog-header h1 { font-family: 'Playfair Display', serif; font-size: 36px; color: #0a1628; margin-bottom: 10px; }
        .blog-header p { color: #6b7a8d; font-size: 16px; }
        
        .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; justify-content: center; }
        .filter-btn { padding: 10px 20px; border: 2px solid #0d6e6e; color: #0d6e6e; background: white; border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .filter-btn.active { background: #0d6e6e; color: white; }
        .filter-btn:hover { background: #0d6e6e; color: white; }
        
        .treatments-box { background: #f4f7f9; padding: 30px; border-radius: 12px; margin-bottom: 40px; }
        .treatments-box h3 { color: #0a1628; font-size: 14px; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .treatment-tags { display: flex; gap: 10px; flex-wrap: wrap; }
        .treatment-tag { padding: 8px 16px; border: 2px solid #0d6e6e; color: #0d6e6e; background: white; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .treatment-tag:hover { background: #0d6e6e; color: white; }
        
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .post-card { background: white; border: 1px solid #dde3ea; border-radius: 12px; overflow: hidden; transition: all 0.3s; cursor: pointer; }
        .post-card:hover { box-shadow: 0 8px 24px rgba(13, 110, 110, 0.15); transform: translateY(-4px); }
        .post-image { width: 100%; height: 180px; background: linear-gradient(135deg, #0d6e6e 0%, #0a3030 100%); display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .post-content { padding: 20px; }
        .post-category { font-size: 12px; color: #0d6e6e; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .post-title { font-size: 18px; color: #0a1628; font-weight: 700; margin-bottom: 10px; line-height: 1.4; }
        .post-desc { font-size: 14px; color: #6b7a8d; line-height: 1.6; margin-bottom: 12px; }
        .post-meta { font-size: 12px; color: #999; display: flex; gap: 12px; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #6b7a8d; }
        .empty-state p { font-size: 16px; }
        
        .loading { text-align: center; padding: 40px; color: #6b7a8d; }
    </style>
</head>
<body style="background: #ffffff;">
    <div class="blog-container">
        <div class="blog-header">
            <h1>Dental Health Blog</h1>
            <p>Expert tips, treatment guides, and oral health awareness from Sri Sai Speciality Dental Care</p>
        </div>
        
        <div class="filters" id="filters"></div>
        
        <div class="treatments-box">
            <h3>Treatments</h3>
            <div class="treatment-tags" id="treatments"></div>
        </div>
        
        <div class="posts-grid" id="posts">
            <div class="loading">Loading blog posts...</div>
        </div>
    </div>

    <script>
        let allPosts = [];
        let filteredPosts = [];
        let currentCategory = 'All Posts';
        
        // Fetch posts
        fetch('./posts-index.json')
            .then(response => {
                if (!response.ok) throw new Error('Failed to load posts');
                return response.json();
            })
            .then(posts => {
                allPosts = posts;
                renderPosts();
                renderFilters();
                renderTreatments();
            })
            .catch(error => {
                console.error('Error loading posts:', error);
                document.getElementById('posts').innerHTML = '<div class="empty-state"><p>Unable to load blog posts. Please try again later.</p></div>';
            });
        
        function renderPosts() {
            const postsDiv = document.getElementById('posts');
            
            if (currentCategory === 'All Posts') {
                filteredPosts = allPosts;
            } else {
                filteredPosts = allPosts.filter(post => post.category === currentCategory);
            }
            
            if (filteredPosts.length === 0) {
                postsDiv.innerHTML = '<div class="empty-state"><p>No posts found in this category.</p></div>';
                return;
            }
            
            postsDiv.innerHTML = filteredPosts.map(post => `
                <div class="post-card" onclick="window.location.href='${post.url}'">
                    <div class="post-image">📝</div>
                    <div class="post-content">
                        <div class="post-category">${post.category}</div>
                        <h3 class="post-title">${post.title}</h3>
                        <p class="post-desc">${post.description}</p>
                        <div class="post-meta">
                            <span>${post.author}</span>
                            <span>${new Date(post.date).toLocaleDateString('en-US', {year: 'numeric', month: 'short', day: 'numeric'})}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderFilters() {
            const categories = ['All Posts', ...new Set(allPosts.map(p => p.category))];
            const filtersDiv = document.getElementById('filters');
            
            filtersDiv.innerHTML = categories.map(cat => `
                <button class="filter-btn ${cat === currentCategory ? 'active' : ''}" onclick="filterCategory('${cat}')">
                    ${cat}
                </button>
            `).join('');
        }
        
        function renderTreatments() {
            const treatments = [...new Set(allPosts.flatMap(p => 
                p.tags ? p.tags.split(',').map(t => t.trim()).filter(t => 
                    ['root canal', 'implant', 'braces', 'aligners', 'wisdom tooth', 'crown', 'denture', 'bridge', 'whitening', 'filling'].some(key => t.toLowerCase().includes(key))
                ) : []
            ))].slice(0, 12);
            
            document.getElementById('treatments').innerHTML = treatments.map(t => `
                <span class="treatment-tag">${t}</span>
            `).join('');
        }
        
        function filterCategory(category) {
            currentCategory = category;
            renderPosts();
            renderFilters();
        }
    </script>
</body>
</html>
